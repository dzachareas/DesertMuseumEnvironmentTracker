<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Weather Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f1115;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1b1f2a;
      border-radius: 12px;
      padding: 15px;
      border: 2px solid #333;
      transition: 0.2s;
    }

    .online {
      border-color: #2ecc71;
    }

    .stale {
      border-color: #f39c12;
      opacity: 0.85;
    }

    .offline {
      border-color: #e74c3c;
      opacity: 0.5;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .value {
      font-size: 15px;
      margin: 4px 0;
      color: #ddd;
    }

    .small {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }

    .signal-bar {
        width: 100%;
        height: 10px;
        background: #333;
        border-radius: 5px;
        margin-top: 8px;
        overflow: hidden;
    }

    .signal-fill {
        height: 100%;
        transition: width 0.3s;
    }
  </style>
</head>

<body>

<h1>ESP32 Weather Dashboard</h1>

<div id="grid">Loading...</div>

<script>

function getStatus(age) {
    if (age < 120) return "online";
    if (age < 300) return "stale";
    return "offline";
}

async function update() {

    const res = await fetch('/api/data');
    const data = await res.json();

    let html = '';

    for (let name in data) {

        const s = data[name];

        const temp = Number(s.temperature ?? 0);
        const hum  = Number(s.humidity ?? 0);
        const pres = Number(s.pressure ?? 0);

        const age = s.last_seen
            ? Math.floor(Date.now()/1000 - s.last_seen)
            : 9999;

        const status = getStatus(age);
        
        const rssi = Number(s.rssi ?? -999);

        let rssiColor = "#e74c3c";
        let rssiLabel = "WEAK";
        let rssiPercent = 10;

        if (rssi > -60) {
            rssiColor = "#2ecc71";
            rssiLabel = "STRONG";
            rssiPercent = 100;
        } else if (rssi > -80) {
            rssiColor = "#f1c40f";
            rssiLabel = "MEDIUM";
            rssiPercent = 60;
        } else {
            rssiColor = "#e74c3c";
            rssiLabel = "WEAK";
            rssiPercent = 25;
        }

        html += `
        <div class="card ${status}">
            <div class="title">${name}</div>

            <div class="value">🌡 ${temp.toFixed(1)} °F</div>
            <div class="value">💧 ${hum.toFixed(1)} %</div>
            <div class="value">📈 ${pres.toFixed(1)} hPa</div>

            <div class="value">📶 RSSI: ${rssi} dBm (${rssiLabel})</div>

            <div class="signal-bar">
                <div class="signal-fill"
                     style="width:${rssiPercent}%; background:${rssiColor};">
                </div>
            </div>

            <div class="small">
                ${status.toUpperCase()} • ${age}s ago
            </div>
        </div>
        `;
    }

    document.getElementById("grid").innerHTML = html;
}

update();
setInterval(update, 3000);

</script>

</body>
</html>
